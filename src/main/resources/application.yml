spring:
  application:
    name: BookMyShow

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/bookmyshow_db
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Properties
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
  
  # Cache Configuration (TTL)
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour in milliseconds
      cache-null-values: false

# Logging Configuration
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

stripe:
    api:
      secret-key: ${Stripe_secret}
      webhook-secret: ${stripe_web_secret}
      publishable-key: ${stripe_publish_key}

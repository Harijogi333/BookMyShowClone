spring:
  application:
    name: BookMyShow

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/bookmyshow_db
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Properties
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
